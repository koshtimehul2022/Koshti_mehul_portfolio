[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npx vite --host :: --port 8081"
  targetPort = 8081

# Redirect all routes to index.html for React Router SPA support.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Secure environment variables should be set in Netlify UI:
# VITE_SUPABASE_URL, VITE_SUPABASE_PUBLISHABLE_KEY, WEB3FORMS_KEY
